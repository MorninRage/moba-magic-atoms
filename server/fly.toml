# MOBA room server — `fly launch` / `fly deploy` from `server/` (see docs/MOBA_HOSTING_SETUP.md).
app = "moba-rooms"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
