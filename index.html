<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#080a0f" />
  <meta name="color-scheme" content="dark" />
  <title>MOBA — Magic Orbiting Brandished Atoms</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap"
    rel="stylesheet"
  />
  <!--
    === 2026-04-20 Compositor-Thread Boot Veil ===

    Inline CSS-only veil painted at first browser frame (~50 ms after page
    load), BEFORE the JS bundle parses. The animation uses ONLY `transform`
    and `opacity` — both compositor-thread properties per Chromium's
    "Anatomy of Jank" — so the spinner + sweep bar keep moving even when
    the JS main thread is 100% saturated by `mountApp` later in the boot.

    Lifecycle:
      1. Painted at HTML-parse time. Player sees motion BEFORE any JS runs.
      2. `main.ts` calls `window.__hideBootVeil()` once `bootIntroExperience`
         is about to mount the title flow → veil fades over 280 ms while
         the start-flow UI fades in.
      3. After Begin/Continue/New, `enterGame` mounts the richer
         `expeditionLoadingOverlay` so the player sees real per-phase
         progress, then double-rAFs the fade-out only after `mountTutorial`
         paints.

    The ABSOLUTE positioning + `contain: strict` isolates the veil's
    layout/paint into its own compositor layer — it never invalidates the
    rest of the page.
  -->
  <style>
    #boot-veil {
      position: fixed;
      inset: 0;
      z-index: 100000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      background:
        radial-gradient(ellipse at 50% 38%, rgba(60, 96, 132, 0.22), transparent 65%),
        linear-gradient(180deg, #0d121c 0%, #060a12 100%);
      color: #cfe6ff;
      font-family: 'Cinzel', system-ui, sans-serif;
      contain: strict;
      transition: opacity 280ms ease, visibility 280ms ease;
      will-change: opacity;
    }
    #boot-veil[data-hidden="true"] {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    #boot-veil .bv-mark {
      width: 88px;
      height: 88px;
      animation: bv-pulse 2s ease-in-out infinite;
      will-change: transform, opacity;
    }
    #boot-veil .bv-mark__ring {
      transform-origin: 50% 50%;
      animation: bv-spin 4.2s linear infinite;
      will-change: transform;
    }
    #boot-veil .bv-title {
      font-size: 1.25rem;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: #e8a54b;
      text-shadow: 0 0 14px rgba(232, 165, 75, 0.45);
      margin: 0;
    }
    #boot-veil .bv-sub {
      font-family: 'DM Sans', system-ui, sans-serif;
      font-size: 0.78rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(207, 230, 255, 0.6);
      margin: 0;
    }
    #boot-veil .bv-bar {
      width: 220px;
      height: 3px;
      border-radius: 999px;
      background: rgba(207, 230, 255, 0.12);
      overflow: hidden;
      position: relative;
    }
    #boot-veil .bv-bar__fill {
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent 0%, #5eb0e8 50%, transparent 100%);
      transform-origin: left;
      transform: translateX(-100%);
      animation: bv-sweep 1.6s ease-in-out infinite;
      will-change: transform;
    }
    @keyframes bv-spin {
      to { transform: rotate(360deg); }
    }
    @keyframes bv-pulse {
      0%, 100% { transform: scale(1); opacity: 0.92; }
      50% { transform: scale(1.06); opacity: 1; }
    }
    @keyframes bv-sweep {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }
    @media (prefers-reduced-motion: reduce) {
      #boot-veil .bv-mark,
      #boot-veil .bv-mark__ring,
      #boot-veil .bv-bar__fill {
        animation: none;
      }
    }
  </style>
</head>
<body>
  <div id="boot-veil" role="status" aria-live="polite" aria-label="Loading IDLE-CRAFT">
    <svg class="bv-mark" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <defs>
        <linearGradient id="bv-grad" x1="8" y1="8" x2="56" y2="56" gradientUnits="userSpaceOnUse">
          <stop stop-color="#b8e0ff"/>
          <stop offset="0.5" stop-color="#5eb0e8"/>
          <stop offset="1" stop-color="#d4a85c"/>
        </linearGradient>
      </defs>
      <g class="bv-mark__ring">
        <circle cx="32" cy="32" r="26" fill="none" stroke="rgba(94,176,232,0.28)" stroke-width="1.4" stroke-dasharray="6 6"/>
      </g>
      <path fill="url(#bv-grad)" opacity="0.95"
        d="M10 42 L32 20 L54 42 L50 46 L42 40 L42 54 L22 54 L22 40 L14 46 Z"/>
      <rect x="18" y="54" width="28" height="7" rx="1.5" fill="#1a2438" stroke="rgba(129,212,250,0.35)" stroke-width="1"/>
    </svg>
    <h1 class="bv-title">Idle Craft</h1>
    <p class="bv-sub">Forging your expedition…</p>
    <div class="bv-bar" aria-hidden="true"><div class="bv-bar__fill"></div></div>
  </div>
  <div id="app"></div>
  <script>
    /* Expose a tiny global the module bundle calls when it's ready to take
     * over the visual. No-op-safe on second call. Kept inline (not in the
     * module bundle) so the function exists the instant the bundle finishes
     * parsing and can be called from anywhere — including very early in
     * `main.ts` before any of the boot machinery is up. */
    window.__hideBootVeil = function () {
      var v = document.getElementById('boot-veil');
      if (!v) return;
      v.setAttribute('data-hidden', 'true');
      /* Remove from DOM after the fade so it can't intercept any future
       * clicks (visibility: hidden + pointer-events: none already prevent
       * this, but full removal is defensive against edge cases). */
      setTimeout(function () { if (v.parentNode) v.parentNode.removeChild(v); }, 320);
    };
  </script>
  <script type="module" src="/src/main.ts"></script>
  <!-- VibeJam 2026 — entrant tracking (keep game on one public domain for judging) -->
  <script async src="https://vibej.am/2026/widget.js"></script>
</body>
</html>
